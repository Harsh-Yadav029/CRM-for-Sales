version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: crm-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - crm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend-api
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/walktheplan
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - crm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-frontend-client
    networks:
      - crm-network

  redis:
    image: redis:alpine
    container_name: crm-redis-cache
    ports:
      - "6379:6379"
    networks:
      - crm-network

  mongodb:
    image: mongo:6.0
    container_name: crm-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - crm-network

volumes:
  mongodb-data:

networks:
  crm-network:
    driver: bridge
